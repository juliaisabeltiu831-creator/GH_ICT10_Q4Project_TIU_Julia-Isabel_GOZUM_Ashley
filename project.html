<!DOCTYPE html>
<html>
<head>
    <title>Class Photos</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            padding: 24px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 16px;
            font-weight: 600;
            opacity: 0.8;
        }

        .navbar a:hover {
            opacity: 1;
        }

        .header {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            backdrop-filter: blur(18px);
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.25s;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card p {
            margin: 0;
            padding: 12px;
            text-align: center;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            opacity: 0.6;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="navbar">
        <div><strong>4Q Project Collaboration</strong></div>
        <div>
            <a href="index.html">Classmate List</a>
            <a href="project.html">Class Photos</a>
            <a href="skills test.html">Attendance</a>
        </div>
    </div>

    <div class="header">
        10 Emerald Photo Gallery
    </div>

    <div id="gallery" class="gallery"></div>

    <div class="footer">
        By Julia Tiu & Ashley Gozum | 10-Emerald
    </div>

</div>

<py-script src="main.py"></py-script>

</body>
</html>
