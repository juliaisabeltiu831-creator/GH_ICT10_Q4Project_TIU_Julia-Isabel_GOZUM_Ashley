<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
<script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

<title>Attendance Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding-top: 24px;
    }

    .container {
        width: 95%;
        max-width: 1200px;
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 24px;
    }

    .card {
        backdrop-filter: blur(18px);
        background: rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    h1 {
        font-size: 1.8rem;
        margin-bottom: 20px;
        text-align: center;
    }

    .navbar {
        width: min(100%, 1200px);
        margin: 0 auto 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        padding: 16px 24px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    .navbar a,
    .navbar-brand {
        text-decoration: none;
        color: white;
        font-weight: 700;
    }
    .nav-items {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: flex-end;
    }
    .nav-btn {
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        color: white;
        transition: background 0.2s ease, transform 0.2s ease;
    }
    .nav-btn:hover {
        background: rgba(255, 255, 255, 0.22);
        transform: translateY(-1px);
    }
    .navbar-title {
        font-size: 1.2rem;
    }
    .field {
        margin-bottom: 16px;
    }

    label {
        font-size: 0.85rem;
        opacity: 0.7;
    }

    select, input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        margin-top: 6px;
        background: rgba(255,255,255,0.1);
        color: white;
    }

    input:focus, select:focus {
        outline: 2px solid #38bdf8;
    }

    button {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.03);
        opacity: 0.9;
    }

    .stats {
        display: flex;
        gap: 12px;
        margin-top: 20px;
    }

    .stat-box {
        flex: 1;
        background: rgba(255,255,255,0.08);
        padding: 14px;
        border-radius: 16px;
        text-align: center;
    }

    .stat-box h2 {
        margin: 0;
        font-size: 1.4rem;
    }

    .graph-card {
        padding: 16px;
    }

    #graph {
        width: 100%;
        min-height: 450px;
    }

    @media (max-width: 900px) {
        .container {
            grid-template-columns: 1fr;
        }
    }
    .footer {
    margin-top: 20px;
    text-align: center;
    opacity: 0.6;
    font-size: 0.85rem;
}
</style>
</head>

<body>

<nav class="navbar">
    <a class="navbar-brand" href="#">Intramurals SY 2025-2026</a>
    <div class="nav-items">
        <a href="index.html" class="nav-btn">Classmate List</a>
        <a href="project.html" class="nav-btn">Class Photos</a>
        <a href="skills test.html" class="nav-btn">Attendance Tracker</a>
    </div>
</nav>

<div class="container">

    <div class="card">
        <h1>Attendance</h1>

        <div class="field">
            <label>Day</label>
            <select id="day-select">
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
            </select>
        </div>

        <div class="field">
            <label>Absences</label>
            <input type="number" id="absence-input" min="0" value="0">
        </div>

        <button id="update-btn">Update Data</button>

    </div>

    <div class="card graph-card">
        <div id="graph"></div>
    </div>
</div>

<div class="footer">
    By Julia Tiu & Ashley Gozum | 10-Emerald
</div>

<py-config>
packages = ["numpy", "matplotlib"]
</py-config>

<py-script src="skills test.py"></py-script>

</body>
</html>
